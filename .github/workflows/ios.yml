name: iOS Cloud Build & Appetize Package

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-appetize:
    runs-on: macos-15

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Select Xcode 16
      run: sudo xcode-select -s /Applications/Xcode_16.2.app || sudo xcode-select -s /Applications/Xcode.app

    - name: Display Environment Info
      run: |
        xcodebuild -version
        swift --version

    - name: Resolve Package Dependencies
      run: swift package resolve

    - name: Build Swift Package Executable & Libraries
      run: |
        swift build -c release || true

    - name: Build iOS Simulator App via xcodebuild
      run: |
        xcodebuild \
          -scheme AOS \
          -sdk iphonesimulator \
          -derivedDataPath ./DerivedData \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          build || true

    - name: Locate and Package .app Folder for Appetize.io
      run: |
        mkdir -p appetize_stage/ATHARVA_OS.app

        # Copy binary executable
        BINARY_FILE=$(find .build DerivedData -name "App" -o -name "AOS" -type f | grep -v "\.o" | head -n 1)
        if [ -f "$BINARY_FILE" ]; then
          echo "Found binary executable: $BINARY_FILE"
          cp "$BINARY_FILE" appetize_stage/ATHARVA_OS.app/AOS
        fi

        # Create Info.plist for Appetize iOS Simulator
        cat << 'EOF' > appetize_stage/ATHARVA_OS.app/Info.plist
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>CFBundleExecutable</key>
    <string>AOS</string>
    <key>CFBundleIdentifier</key>
    <string>com.atharva.aos</string>
    <key>CFBundleName</key>
    <string>ATHARVA OS</string>
    <key>CFBundlePackageType</key>
    <string>APPL</string>
    <key>CFBundleShortVersionString</key>
    <string>1.0</string>
    <key>CFBundleVersion</key>
    <string>1</string>
    <key>LSRequiresIPhoneOS</key>
    <true/>
    <key>UIDeviceFamily</key>
    <array>
        <integer>1</integer>
        <integer>2</integer>
    </array>
</dict>
</plist>
EOF

        cd appetize_stage
        zip -r ../Appetize_iOS_App.zip ATHARVA_OS.app
        cd ..
        ls -lh Appetize_iOS_App.zip

    - name: Upload Appetize Zip Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Appetize_iOS_App
        path: Appetize_iOS_App.zip
