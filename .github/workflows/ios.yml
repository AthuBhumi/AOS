name: iOS Cloud Build & Appetize Package

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-appetize:
    runs-on: macos-15

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Select Xcode 16
      run: sudo xcode-select -s /Applications/Xcode_16.2.app || sudo xcode-select -s /Applications/Xcode.app

    - name: Display Environment Info
      run: |
        xcodebuild -version
        swift --version

    - name: Resolve Package Dependencies
      run: swift package resolve

    - name: Build Swift Package Executable
      run: |
        swift build -c release

    - name: Assemble Appetize App Bundle
      run: |
        mkdir -p appetize_stage/ATHARVA_OS.app
        cp .build/release/App appetize_stage/ATHARVA_OS.app/AOS || cp .build/release/AOS appetize_stage/ATHARVA_OS.app/AOS || true
        
        echo '<?xml version="1.0" encoding="UTF-8"?>' > appetize_stage/ATHARVA_OS.app/Info.plist
        echo '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' >> appetize_stage/ATHARVA_OS.app/Info.plist
        echo '<plist version="1.0">' >> appetize_stage/ATHARVA_OS.app/Info.plist
        echo '<dict>' >> appetize_stage/ATHARVA_OS.app/Info.plist
        echo '    <key>CFBundleExecutable</key><string>AOS</string>' >> appetize_stage/ATHARVA_OS.app/Info.plist
        echo '    <key>CFBundleIdentifier</key><string>com.atharva.aos</string>' >> appetize_stage/ATHARVA_OS.app/Info.plist
        echo '    <key>CFBundleName</key><string>ATHARVA OS</string>' >> appetize_stage/ATHARVA_OS.app/Info.plist
        echo '    <key>CFBundlePackageType</key><string>APPL</string>' >> appetize_stage/ATHARVA_OS.app/Info.plist
        echo '    <key>CFBundleShortVersionString</key><string>1.0</string>' >> appetize_stage/ATHARVA_OS.app/Info.plist
        echo '    <key>CFBundleVersion</key><string>1</string>' >> appetize_stage/ATHARVA_OS.app/Info.plist
        echo '    <key>LSRequiresIPhoneOS</key><true/>' >> appetize_stage/ATHARVA_OS.app/Info.plist
        echo '    <key>UIDeviceFamily</key><array><integer>1</integer><integer>2</integer></array>' >> appetize_stage/ATHARVA_OS.app/Info.plist
        echo '</dict>' >> appetize_stage/ATHARVA_OS.app/Info.plist
        echo '</plist>' >> appetize_stage/ATHARVA_OS.app/Info.plist

        cd appetize_stage
        zip -r ../Appetize_iOS_App.zip ATHARVA_OS.app
        cd ..
        ls -lh Appetize_iOS_App.zip

    - name: Upload Appetize Zip Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Appetize_iOS_App
        path: Appetize_iOS_App.zip
