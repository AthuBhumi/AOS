name: iOS Cloud Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-15

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_16.2.app || sudo xcode-select -s /Applications/Xcode.app

    - name: Show Swift version
      run: swift --version

    - name: Resolve dependencies
      run: swift package resolve

    - name: Build all targets
      run: swift build -v 2>&1 | tail -100

    - name: List build output
      if: always()
      run: find .build -name "*.o" -o -name "*.swiftmodule" -o -name "AOS" | head -50

    - name: Generate Xcode Project
      run: |
        mkdir -p AOSIPHONE.xcodeproj
        swift package dump-package > package-dump.json

    - name: Build iOS Simulator App
      run: |
        xcodebuild build \
          -scheme AOS \
          -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
          -derivedDataPath ./DerivedData \
          CODE_SIGNING_ALLOWED=NO \
          2>&1 | tail -80

    - name: Package build artifacts
      if: always()
      run: |
        mkdir -p artifacts
        cp -r DerivedData/Build/Products/Debug-iphonesimulator/ artifacts/ 2>/dev/null || true
        cp -r .build/ artifacts/swift-build/ 2>/dev/null || true
        ls -la artifacts/ || echo "No artifacts found"

    - name: Upload Build
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: AOS-Build
        path: artifacts/
        if-no-files-found: warn
