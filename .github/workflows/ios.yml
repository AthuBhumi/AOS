name: iOS Cloud Build & Appetize Package

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-appetize:
    runs-on: macos-15

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Select Xcode 16
      run: sudo xcode-select -s /Applications/Xcode_16.2.app || sudo xcode-select -s /Applications/Xcode.app

    - name: Display Environment Info
      run: |
        xcodebuild -version
        swift --version

    - name: Resolve Package Dependencies
      run: swift package resolve

    - name: Build Real iOS Simulator App & Package for Appetize.io
      run: |
        python3 package_real_appetize.py

    - name: Upload Appetize Zip Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Appetize_iOS_App
        path: Appetize_iOS_App.zip
