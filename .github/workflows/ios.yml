name: iOS Cloud Build & Appetize Package

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-appetize:
    runs-on: macos-15

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Select Xcode 16
      run: sudo xcode-select -s /Applications/Xcode_16.2.app || sudo xcode-select -s /Applications/Xcode.app

    - name: Display Xcode Version
      run: xcodebuild -version

    - name: Generate Xcode Project File
      run: python3 generate_xcodeproj.py

    - name: Build Native iOS App for Simulator via xcodebuild
      run: |
        xcodebuild \
          -project ATHARVA_OS.xcodeproj \
          -scheme ATHARVA_OS \
          -sdk iphonesimulator \
          -derivedDataPath ./DerivedData \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          build

    - name: Verify .app Directory
      if: always()
      run: |
        ls -la DerivedData/Build/Products/Debug-iphonesimulator/ || echo "Products dir not found"

    - name: Compress ATHARVA_OS.app for Appetize.io
      run: |
        cd DerivedData/Build/Products/Debug-iphonesimulator/
        zip -r ../../../../Appetize_iOS_App.zip ATHARVA_OS.app
        cd ../../../../
        ls -lh Appetize_iOS_App.zip

    - name: Upload Appetize Zip Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Appetize_iOS_App
        path: Appetize_iOS_App.zip
